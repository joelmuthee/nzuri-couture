name: Deploy to Cloudflare

# Auto-deploy on every push to main. This replaces CF Pages' native git
# integration (whose webhook is known to silently stop firing) by running the
# same wrangler commands we'd run by hand — the reliable path.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy static site to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy . --project-name=nzuri-couture --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "58685495706b973821d77208248c66fc"

      - name: Deploy Worker
        working-directory: worker
        run: npx --yes wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "58685495706b973821d77208248c66fc"
